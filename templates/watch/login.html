{%extends 'watch/index.html' %}
{%block title%}Home{%endblock%}
{%load static%} {% block content %}

<div class="collector mt-2">
    
    <div class="row g-1 m-2">
        <div class="col-md-6">
            <img src="{% static 'img/login.jpg' %}" alt="login">
        </div>
        <div class="col-md-6">
            <div class="login">
                <form>
                    <div class="text-center">
                        <img src="{%static 'img/loginlogo.png'%}" class="rounded" alt="loginimage">
                      </div>
                    <div class="mb-3">
                      <label for="email" class="form-label">Email address</label>
                      <input type="email" name="email" class="form-control" id="email" aria-describedby="emailHelp" placeholder="Enter Email">
                      <div id="emailHelp" class="form-text">We'll never share your email with anyone else.</div>
                    </div>
                    <div class="mb-3">
                      <label for="password" class="form-label">Password</label>
                      <input type="password" name="password" class="form-control" id="password" placeholder="password">
                    </div>
                    <div class="mb-3">
                        <p>Don't Have Account <a href="{% url 'signup'%}">Sign up</a></p>
                      </div>
                    <button type="submit" id="submit" class="btn btn-primary">Submit</button>
                    <button type="reset" id="reset" class="btn btn-primary">Reset</button>
                  </form>
            </div>
            
        </div>
    </div>
</div>
<script src="{%static 'js/login.js'%}"></script>

{%endblock%}
