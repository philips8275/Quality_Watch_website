{% extends 'watch/index.html' %}
{% block title %} Contact Us {% endblock %}
{% load static %}

{% block content %}
<div class="container2 mt-4">
    <div class="row gx-0">
        <div class="col-md-5">
            <img class="img-fluid" src="{% static 'img/contact.jpg' %}" alt="Contact Us">
        </div>
        <div class="col-md-6">
            <form action="{% url 'submit_contact' %}" method="post">
                {% csrf_token %}
                <h1 class="text-center">Contact Us</h1>
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" class="form-control" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" class="form-control" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea class="form-control" id="message" name="message" rows="5" required></textarea>
                </div>
                <button type="submit" class="btn btn-outline-dark btn-lg btn-block mt-2" onclick="Contact_submit(event)">Submit</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
